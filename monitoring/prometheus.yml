# Prometheus configuration for World Cup Betting Insights
# Mount this file to /etc/prometheus/prometheus.yml in the container

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'world-cup-betting-cli'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  # - "alerts.yml"

scrape_configs:
  # Scrape the API service
  - job_name: 'worldcup-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
