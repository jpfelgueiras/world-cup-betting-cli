name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'backend/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite with coverage
        run: |
          PYTHONPATH=src pytest tests/ \
            --verbose \
            --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov

      - name: Enforce coverage floor
        if: matrix.python-version == '3.12'
        run: |
          PYTHONPATH=src pytest tests/ \
            --quiet \
            --cov=src \
            --cov-report=term \
            --cov-fail-under=70

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml-py${{ matrix.python-version }}
          path: backend/coverage.xml
          retention-days: 7

      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html-py${{ matrix.python-version }}
          path: backend/htmlcov/
          retention-days: 7

  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install quality tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black isort mypy

      - name: Run flake8
        run: flake8 src/ tests/ --max-line-length=120 --extend-ignore=E203

      - name: Check formatting with black
        run: black --check src/ tests/

      - name: Check imports with isort
        run: isort --check-only src/ tests/

      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports --no-strict-optional

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: backend/Dockerfile
          push: false
          tags: worldcup-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image health
        run: |
          echo "Starting container..."
          docker run -d --name test-container -p 8000:8000 \
            -e DEV_MODE=false \
            -e VALID_API_KEYS=ci-docker-health-key \
            -e ALLOW_IN_MEMORY_RATE_LIMIT=true \
            worldcup-backend:test
          CONTAINER_ID=$(docker ps -q -f name=test-container)
          if [ -z "$CONTAINER_ID" ]; then
            echo "ERROR: Container failed to start"
            exit 1
          fi
          echo "Container started: $CONTAINER_ID"
          echo "Waiting 30 seconds for application to initialize..."
          sleep 30
          echo "Checking if container is still running..."
          if ! docker ps | grep -q test-container; then
            echo "ERROR: Container exited before the health check"
            echo "=== Last 50 lines of container logs ==="
            docker logs test-container 2>&1 | tail -50 || true
            docker rm test-container || true
            exit 1
          fi
          echo "Container is running. Testing health endpoint..."
          if curl -v -f --max-time 10 http://localhost:8000/health 2>&1; then
            echo "Health check passed!"
          else
            echo "ERROR: Health endpoint not responding"
            echo "=== Container logs ==="
            docker logs test-container 2>&1 | tail -50 || true
            docker stop test-container || true
            docker rm test-container || true
            exit 1
          fi
          docker stop test-container || true
          docker rm test-container || true
