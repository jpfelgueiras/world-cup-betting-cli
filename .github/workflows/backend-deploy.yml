---
name: Backend Deploy

'on':
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-render:
    name: Test, build, and deploy backend to Render
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest tests -q

      - name: Build backend Docker image
        run: docker build --file backend/Dockerfile --tag world-cup-betting-backend:${{ github.sha }} backend

      - name: Trigger Render deploy
        if: github.ref == 'refs/heads/main'
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_URL secret is not set; skipping Render deploy trigger."
            echo "Set the RENDER_DEPLOY_HOOK_URL repository secret to the Render deploy hook URL."
            exit 0
          fi
          echo "Triggering Render deploy hook..."
          curl --fail --show-error --silent --request POST "$RENDER_DEPLOY_HOOK_URL"
