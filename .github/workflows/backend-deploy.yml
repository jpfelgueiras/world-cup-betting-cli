name: Backend Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-koyeb:
    name: Deploy backend to Koyeb
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install and configure Koyeb CLI
        uses: koyeb-community/koyeb-actions@v2
        with:
          api_token: ${{ secrets.KOYEB_API_TOKEN }}

      - name: Deploy Docker service to Koyeb
        uses: koyeb/action-git-deploy@v1
        with:
          app-name: world-cup-betting
          service-name: backend
          git-url: github.com/${{ github.repository }}
          git-branch: main
          git-sha: ${{ github.sha }}
          git-workdir: backend
          git-builder: docker
          git-docker-dockerfile: Dockerfile
          service-instance-type: nano
          service-regions: fra
          service-ports: '8000:http'
          service-routes: '/:8000'
          service-env: >-
            PORT=8000,
            DEV_MODE=false,
            ENABLE_CORS=true,
            CORS_ORIGINS=${{ secrets.FRONTEND_URL }},
            VALID_API_KEYS=${{ secrets.BACKEND_API_KEYS }},
            LOG_LEVEL=INFO
